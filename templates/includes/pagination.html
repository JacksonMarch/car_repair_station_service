{% load query_transform %}
{% if is_paginated %}
  <nav aria-label="Table navigation" class="d-flex justify-content-center mt-4 mb-5">
    <ul class="pagination shadow-sm">

      {% if page_obj.has_previous %}
        <li class="page-item">
          <a href="?{% query_transform request page=page_obj.previous_page_number %}" class="page-link text-primary fw-medium px-4">
            &laquo; Prev
          </a>
        </li>
      {% else %}
        <li class="page-item disabled">
          <span class="page-link px-4">&laquo; Prev</span>
        </li>
      {% endif %}

      <li class="page-item active">
        <span class="page-link px-4 fw-bold">
          {{ page_obj.number }} of {{ paginator.num_pages }}
        </span>
      </li>

      {% if page_obj.has_next %}
        <li class="page-item">
          <a href="?{% query_transform request page=page_obj.next_page_number %}" class="page-link text-primary fw-medium px-4">
            Next &raquo;
          </a>
        </li>
      {% else %}
        <li class="page-item disabled">
          <span class="page-link px-4">Next &raquo;</span>
        </li>
      {% endif %}

    </ul>
  </nav>
{% endif %}

{% extends "base.html" %}

{% block content %}
  <h1>Delete Master Qualification?</h1>
  <p>In all Technicians where this qualification was used, the value will change to NULL.</p>
  <form action="" method="post">
    {% csrf_token %}

    <input type="submit" value="Yes" class="btn btn-danger">
    <a href="{{ request.GET.next|default:'/' }}" class="btn btn-success">
      Cancel
    </a>
  </form>
{% endblock %}

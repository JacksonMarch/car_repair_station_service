{% extends "base.html" %}

{% block content %}
  <h1>Archive this order?</h1>
  <form action="" method="post">
    {% csrf_token %}

    <input type="submit" value="Yes" class="btn btn-danger">
    <a href="{{ request.GET.next|default:'/' }}" class="btn btn-success">
      Cancel
    </a>
  </form>
{% endblock %}

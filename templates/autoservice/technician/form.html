{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-10 col-lg-8">

    <div class="card shadow-sm border-0 mt-4 rounded-3">
      <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
        <h3 class="mb-0 fw-bold text-dark">
          {{ object|yesno:"Update,Create" }} Technician
        </h3>
      </div>

      <div class="card-body p-4">
        <form action="" method="post" novalidate>
          {% csrf_token %}

          {{ form|crispy }}

          <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 fw-medium">
              Cancel
            </a>
            <button type="submit" class="btn btn-primary px-4 fw-medium shadow-sm">
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0 text-dark fw-bold">Order types</h2>
  <a href="{% url 'autoservice:order-type-create' %}" class="btn btn-primary shadow-sm px-4">
    + Create
  </a>
</div>

<div class="card shadow-sm border-0 mb-4">
  <div class="card-body p-0 table-responsive">
    {% if order_type_list %}
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light text-secondary">
        <tr>
          <th class="ps-4" style="width: 15%;">ID</th>
          <th style="width: 55%;">Name</th>
          <th style="width: 15%;">Update</th>
          <th class="pe-4" style="width: 15%;">Delete</th>
        </tr>
        </thead>
        <tbody>
        {% for order_type in order_type_list %}
          <tr>
            <td class="ps-4 text-muted">#{{ order_type.id }}</td>
            <td class="fw-medium text-dark">{{ order_type.name }}</td>
            <td>
              <a href="{% url 'autoservice:order-type-update' pk=order_type.id %}" class="btn btn-sm btn-outline-primary">
                Update
              </a>
            </td>
            <td class="pe-4">
              <a href="{% url 'autoservice:order-type-delete' pk=order_type.id %}?next={{ request.path }}" class="btn btn-sm btn-outline-danger">
                Delete
              </a>
            </td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    {% else %}
      <div class="text-center py-5 text-muted">
        <p class="fs-5 mb-0">There are no Order types.</p>
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
